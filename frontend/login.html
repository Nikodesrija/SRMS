<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SRMS - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>

/* Background */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#3a7bd5,#00d2ff);
}

/* Login Card */

.login-box{
width:420px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 20px 45px rgba(0,0,0,0.25);
}

/* Header */

.login-header{
text-align:center;
margin-bottom:30px;
}

.logo-circle{
width:70px;
height:70px;
background:linear-gradient(135deg,#3a7bd5,#00d2ff);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 15px auto;
color:white;
font-size:28px;
}

.login-header h2{
font-weight:700;
margin-bottom:5px;
}

.login-header p{
color:#666;
font-size:14px;
}

/* Input styling */

.input-group-text{
background:#f1f3f7;
border-right:0;
}

.form-control{
border-left:0;
height:45px;
}

/* Button */

.btn-primary{
background:linear-gradient(135deg,#3a7bd5,#00a6ff);
border:none;
height:45px;
font-size:18px;
font-weight:500;
transition:0.3s;
}

.btn-primary:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

/* Demo Credentials */

.demo-credentials{
margin-top:25px;
background:#f8f9fa;
padding:15px;
border-radius:8px;
font-size:14px;
}

.demo-credentials h6{
font-weight:600;
margin-bottom:10px;
}

/* Footer */

.login-footer{
text-align:center;
margin-top:20px;
}

.login-footer a{
color:#3a7bd5;
font-weight:500;
text-decoration:none;
}

.login-footer a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-box">

<div class="login-header">

<div class="logo-circle">
<i class="fas fa-graduation-cap"></i>
</div>

<h2 id="loginTitle">SRMS Login</h2>
<p id="loginSubtitle">Student Record Management System</p>

</div>

<form id="loginForm" onsubmit="handleLogin(event)">

<div class="form-group">

<label for="username">Username</label>

<div class="input-group">

<div class="input-group-prepend">
<span class="input-group-text">
<i class="fas fa-user"></i>
</span>
</div>

<input
type="text"
class="form-control"
id="username"
placeholder="Enter your username"
required>

</div>

</div>

<div class="form-group">

<label for="password">Password</label>

<div class="input-group">

<div class="input-group-prepend">
<span class="input-group-text">
<i class="fas fa-lock"></i>
</span>
</div>

<input
type="password"
class="form-control"
id="password"
placeholder="Enter your password"
required>

</div>

</div>

<div id="errorMessage" class="alert alert-danger d-none"></div>

<div id="loadingSpinner" class="d-none text-center mb-3">
<div class="spinner-border text-primary"></div>
</div>

<button
type="submit"
class="btn btn-primary btn-block"
id="loginBtn">

<i class="fas fa-sign-in-alt"></i> Login

</button>

</form>

<div class="demo-credentials">

<h6>Demo Credentials</h6>

<p><strong>Student:</strong> student1 / pass123</p>
<p><strong>Staff:</strong> staff1 / pass123</p>
<p><strong>Admin:</strong> admin1 / pass123</p>

</div>

<div class="login-footer">

<a href="index.html">
<i class="fas fa-arrow-left"></i> Back to Home
</a>

</div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
