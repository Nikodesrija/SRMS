<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRMS - Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fas fa-graduation-cap"></i> SRMS - Students</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="javascript:logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0"><i class="fas fa-users"></i> Students</h2>
            <span class="text-muted d-none d-md-inline">Live data from `/students` API</span>
        </div>

        <div class="card mb-3">
            <div class="card-body">
                <div class="form-row">
                    <div class="form-group col-md-4 mb-2">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search by name or department...">
                    </div>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="bg-primary text-white">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="studentsTable">
                    <tr><td colspan="5" class="text-center">Loading students...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer class="bg-dark text-white py-3 mt-4">
        <div class="container text-center">
            <p>&copy; 2024 Student Record Management System. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        let allStudents = [];

        function renderStudents(list) {
            const tbody = document.getElementById("studentsTable");
            if (!tbody) return;

            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No students found.</td></tr>';
                return;
            }

            tbody.innerHTML = "";
            list.forEach(s => {
                const row = `<tr>
                    <td>${s.studentId || ""}</td>
                    <td>${(s.firstName || "") + " " + (s.lastName || "")}</td>
                    <td>${s.email || "-"}</td>
                    <td>${s.department || "-"}</td>
                    <td>
<span class="badge ${s.status==='Active'?'badge-success':'badge-secondary'}">
${s.status || "Active"}
</span>
</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function loadStudentsPage() {
            checkAuth();
            apiGet("/students")
                .then(data => {
                    allStudents = Array.isArray(data) ? data : [];
                    renderStudents(allStudents);
                })
                .catch(err => {
                    console.error(err);
                    renderStudents([]);
                });
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadStudentsPage();

            const searchInput = document.getElementById("searchInput");
            if (searchInput) {
                searchInput.addEventListener("input", e => {
                    const q = e.target.value.toLowerCase();
                    const filtered = allStudents.filter(s => {
                        const name = ((s.firstName || "") + " " + (s.lastName || "")).toLowerCase();
                        const dept = (s.department || "").toLowerCase();
                        return name.includes(q) || dept.includes(q);
                    });
                    renderStudents(filtered);
                });
            }
        });
    </script>
</body>
</html>
